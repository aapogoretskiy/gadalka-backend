spring:
  application:
    name: gadalka-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gadalka}
    username: ${SPRING_DATASOURCE_USERNAME:gadalka}
    password: ${SPRING_DATASOURCE_PASSWORD:gadalka}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Лимит размера тела HTTP-запроса (защита от DoS)
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  tomcat:
    # Максимальный размер тела для обычных POST-запросов
    max-swallow-size: 1MB

telegram:
  auth:
    enable: ${TELEGRAM_AUTH_ENABLE:false}
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: magicliora_bot
    app-url: https://magicliora.com/
    enabled: true

jwt:
  secret: ${JWT_SECRET}

# ЮKassa — платёжный провайдер для рублёвых платежей
# Тестовые credentials: получить на yookassa.ru после регистрации
# Боевые credentials: выдаются после верификации ИП
yookassa:
  shop-id: ${YOOKASSA_SHOP_ID}
  secret-key: ${YOOKASSA_SECRET_KEY}
  api-url: https://api.yookassa.ru/v3
  # URL куда ЮKassa перенаправит пользователя после оплаты
  return-url: ${YOOKASSA_RETURN_URL:https://magicliora.com/payment/result}
  webhook:
    # Фильтрация запросов на webhook по IP-адресам ЮKassa
    # В dev отключить: YOOKASSA_WEBHOOK_IP_FILTER_ENABLED=false
    # В продакшне всегда true
    ip-filter-enabled: ${YOOKASSA_WEBHOOK_IP_FILTER_ENABLED:true}

# Scheduler для обработки очереди webhook'ов
# fixedDelay: задержка между окончанием предыдущего и началом следующего запуска (мс)
payment:
  webhook:
    process-delay-ms: ${PAYMENT_WEBHOOK_PROCESS_DELAY_MS:30000}

openrouter:
  api-key: ${OPENROUTER_API_KEY}
  url: https://openrouter.ai/api/v1/chat/completions
  model: openai/gpt-4o-mini

# Swagger/OpenAPI: в продакшне отключить (SWAGGER_ENABLED=false или не задавать)
# В dev: запустить с SWAGGER_ENABLED=true или использовать дефолт true для локальной разработки
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}

# Spring Actuator: открываем только /health, остальное скрываем
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

security:
  cors:
    # В dev можно добавить: http://localhost:5173,http://localhost:3000
    # .ru оставлен как fallback на период перехода
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://magicliora.com,https://magicliora.ru}

logging:
  level:
    root: INFO
    ru.sapa.gadalka_backend: DEBUG