spring:
  application:
    name: gadalka-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gadalka}
    username: ${SPRING_DATASOURCE_USERNAME:gadalka}
    password: ${SPRING_DATASOURCE_PASSWORD:gadalka}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

telegram:
  auth:
    enable: ${TELEGRAM_AUTH_ENABLE:false}
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: magicliora_bot
    app-url: https://magicliora.ru/
    enabled: true

jwt:
  secret: ${JWT_SECRET}

openrouter:
  api-key: ${OPENROUTER_API_KEY}
  url: https://openrouter.ai/api/v1/chat/completions
  model: openai/gpt-4o-mini

logging:
  level:
    root: INFO
    ru.sapa.gadalka_backend: DEBUG