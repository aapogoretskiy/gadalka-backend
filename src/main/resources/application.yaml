spring:
  application:
    name: gadalka-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/gadalka
    username: gadalka
    password: gadalka
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration