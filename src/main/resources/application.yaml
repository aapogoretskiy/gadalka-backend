spring:
  application:
    name: gadalka-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gadalka}
    username: ${SPRING_DATASOURCE_USERNAME:gadalka}
    password: ${SPRING_DATASOURCE_PASSWORD:gadalka}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Лимит размера тела HTTP-запроса (защита от DoS)
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  tomcat:
    # Максимальный размер тела для обычных POST-запросов
    max-swallow-size: 1MB

telegram:
  auth:
    enable: ${TELEGRAM_AUTH_ENABLE:false}
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: magicliora_bot
    app-url: https://magicliora.ru/
    enabled: true

jwt:
  secret: ${JWT_SECRET}

openrouter:
  api-key: ${OPENROUTER_API_KEY}
  url: https://openrouter.ai/api/v1/chat/completions
  model: openai/gpt-4o-mini

# Swagger/OpenAPI: в продакшне отключить (SWAGGER_ENABLED=false или не задавать)
# В dev: запустить с SWAGGER_ENABLED=true или использовать дефолт true для локальной разработки
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}

# Spring Actuator: открываем только /health, остальное скрываем
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

security:
  cors:
    # В dev можно добавить: http://localhost:5173,http://localhost:3000
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://magicliora.ru}

logging:
  level:
    root: INFO
    ru.sapa.gadalka_backend: DEBUG